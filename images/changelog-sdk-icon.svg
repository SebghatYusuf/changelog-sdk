<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Changelog SDK Icon</title>
  <desc id="desc">Sleek document representing release notes, combined with a rotating history rewind clock.</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#1A1C29" />
      <stop offset="100%" stop-color="#0B0C10" />
    </linearGradient>

    <linearGradient id="docGloss" x1="48" y1="36" x2="168" y2="196">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.01" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="historyGlow" x1="120" y1="120" x2="220" y2="220">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    
    <linearGradient id="cyanLine" x1="68" y1="70" x2="150" y2="70">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0088FF" />
    </linearGradient>
  </defs>

  <style>
    .float-1 { animation: float-up-down 6s ease-in-out infinite; }
    .float-2 { animation: float-down-up 6s ease-in-out infinite; }
    .spin-fast { transform-origin: 168px 168px; animation: spin-ccw 4s linear infinite; }
    .spin-slow { transform-origin: 168px 168px; animation: spin-ccw 24s linear infinite; }
    .spin-ring { transform-origin: 168px 168px; animation: spin-ccw 8s linear infinite; }
    
    @keyframes float-up-down {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes float-down-up {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    @keyframes spin-ccw {
      to { transform: rotate(-360deg); }
    }
  </style>

  <!-- App Background Box -->
  <rect width="256" height="256" rx="60" fill="url(#bgGrad)" />
  
  <!-- ============================================== -->
  <!-- 1. The Changelog Document (Versions Timeline)  -->
  <!-- ============================================== -->
  <g class="float-1">
    <!-- Document Card -->
    <rect x="44" y="36" width="132" height="168" rx="16" fill="#141724" stroke="#2F3652" stroke-width="2" />
    <rect x="44" y="36" width="132" height="168" rx="16" fill="url(#docGloss)" />
    
    <!-- Vertical Track -->
    <line x1="68" y1="60" x2="68" y2="180" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2" stroke-linecap="round" />

    <!-- Top Entry -->
    <circle cx="68" cy="70" r="6" fill="#141724" stroke="#00F0FF" stroke-width="3" />
    <path d="M 88 66 L 140 66" stroke="url(#cyanLine)" stroke-width="6" stroke-linecap="round" />
    <path d="M 88 78 L 120 78" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round" />

    <!-- Middle Entry -->
    <circle cx="68" cy="120" r="6" fill="#141724" stroke="#FF007A" stroke-width="3" />
    <path d="M 88 116 L 150 116" stroke="#FF007A" stroke-width="6" stroke-linecap="round" />
    <path d="M 88 128 L 115 128" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round" />

    <!-- Bottom Entry -->
    <g opacity="0.5">
      <circle cx="68" cy="170" r="6" fill="#141724" stroke="#00F0FF" stroke-width="3" />
      <path d="M 88 166 L 125 166" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" />
      <path d="M 88 178 L 110 178" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round" />
    </g>
  </g>

  <!-- ============================================== -->
  <!-- 2. The History Clock (Pure CSS Translation)    -->
  <!-- ============================================== -->
  <g class="float-2">
    <!-- Clock Dark Box -->
    <circle cx="168" cy="168" r="48" fill="#1A1C29" stroke="#361545" stroke-width="2" />
    
    <!-- Rotating Ring -->
    <g class="spin-ring">
      <path d="M 198 143 A 36 36 0 1 1 168 132" fill="none" stroke="url(#historyGlow)" stroke-width="6" stroke-linecap="round" />
      <path d="M 178 122 L 165 132 L 180 140" fill="none" stroke="url(#historyGlow)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
    </g>

    <circle cx="168" cy="168" r="4" fill="#FFFFFF" />
    
    <!-- Clock Hands -->
    <g class="spin-fast">
      <line x1="168" y1="168" x2="168" y2="142" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    </g>
    <g class="spin-slow">
      <line x1="168" y1="168" x2="148" y2="178" stroke="#FF007A" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>
  
  <rect width="254" height="254" x="1" y="1" rx="59" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2" />
</svg>
